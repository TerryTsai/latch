name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --target ${{ matrix.target }}
      - name: package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/latch dist/
          cd dist
          tar -czf ../latch-${{ matrix.target }}.tar.gz latch
          sha256sum ../latch-${{ matrix.target }}.tar.gz > ../latch-${{ matrix.target }}.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            latch-${{ matrix.target }}.tar.gz
            latch-${{ matrix.target }}.tar.gz.sha256
          generate_release_notes: true
