<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>latch</title>
<style>
:root {
  color-scheme: light dark;
  --bg-top: #fbfbfb;
  --bg-bot: #eeeeee;
  --fg: #1c1c1e;
  --soft: rgba(60, 60, 67, 0.6);
  --glass: rgba(255, 255, 255, 0.7);
  --hairline-top: rgba(255, 255, 255, 0.6);
  --hairline-bot: rgba(0, 0, 0, 0.10);
  --shadow:
    0 8px 24px -8px rgba(0, 0, 0, 0.10),
    0 2px 4px -1px rgba(0, 0, 0, 0.05);
  --shadow-active:
    0 4px 10px -4px rgba(0, 0, 0, 0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-top: #0c0c0e;
    --bg-bot: #000;
    --fg: #f5f5f7;
    --soft: rgba(235, 235, 245, 0.55);
    --glass: rgba(255, 255, 255, 0.08);
    --hairline-top: rgba(255, 255, 255, 0.22);
    --hairline-bot: rgba(255, 255, 255, 0.14);
    --shadow:
      0 12px 32px -10px rgba(0, 0, 0, 0.5);
    --shadow-active:
      0 6px 14px -4px rgba(0, 0, 0, 0.4);
  }
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100dvh;
}

body {
  background: linear-gradient(180deg, var(--bg-top), var(--bg-bot));
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: grid;
  place-items: center;
  padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
}

main {
  display: grid;
  place-items: center;
  opacity: 0;
  transform: translateY(8px);
  animation: settle 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
}

button {
  font-family: inherit;
  font-size: 0.9375rem;
  font-weight: 300;
  width: 12rem;
  padding: 1rem 0;
  background-color: var(--glass);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
          backdrop-filter: blur(28px) saturate(1.4);
  color: var(--fg);
  border: 1px solid var(--hairline-top);
  border-bottom-color: var(--hairline-bot);
  border-radius: 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  box-shadow: var(--shadow);
  transition:
    transform  200ms cubic-bezier(0.16, 1, 0.3, 1),
    box-shadow 200ms cubic-bezier(0.16, 1, 0.3, 1),
    opacity    200ms ease;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
}

button:not(:disabled):active {
  transform: scale(0.97);
  box-shadow: var(--shadow-active);
}

p {
  display: none;
  margin: 0;
  font-size: 0.8125rem;
  font-weight: 400;
  color: var(--soft);
  text-align: center;
}

p:not(:empty) {
  display: block;
  margin-top: 0.75rem;
}

@keyframes settle {
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  main { animation: none; opacity: 1; transform: none; }
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
}
</style>

<main>
  <button id=b disabled>sign in</button>
  <p id=m></p>
</main>

<script>
const b=document.getElementById('b'),m=document.getElementById('m');
let signedIn=false;
const dec=x=>Uint8Array.from(atob(x.replace(/-/g,'+').replace(/_/g,'/').padEnd(x.length+(4-x.length%4)%4,'=')),c=>c.charCodeAt(0));
const enc=x=>btoa(String.fromCharCode(...new Uint8Array(x))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');

fetch('/verify').then(r=>{
  if(r.status===200){
    signedIn=true;
    b.textContent='sign out';
  }
}).finally(()=>b.disabled=false);

async function login(){
  const r=await fetch('/begin'+location.search,{method:'POST'});
  if(!r.ok)throw new Error(await r.text());
  const {mode,options}=await r.json();
  const pk=options.publicKey;
  pk.challenge=dec(pk.challenge);
  if(mode==='register'){pk.user.id=dec(pk.user.id);pk.excludeCredentials?.forEach(c=>c.id=dec(c.id))}
  else{pk.allowCredentials?.forEach(c=>c.id=dec(c.id))}
  const cred=await navigator.credentials[mode==='register'?'create':'get']({publicKey:pk});
  const res=mode==='register'?{
    clientDataJSON:enc(cred.response.clientDataJSON),
    attestationObject:enc(cred.response.attestationObject),
  }:{
    clientDataJSON:enc(cred.response.clientDataJSON),
    authenticatorData:enc(cred.response.authenticatorData),
    signature:enc(cred.response.signature),
    userHandle:cred.response.userHandle?enc(cred.response.userHandle):null,
  };
  const body={id:cred.id,rawId:enc(cred.rawId),type:cred.type,response:res};
  const c=await fetch('/complete',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!c.ok)throw new Error(await c.text());
  const {next}=await c.json();
  location.href=next;
}

async function logout(){
  const r=await fetch('/logout',{method:'POST'});
  if(!r.ok)throw new Error(await r.text());
  location.reload();
}

async function go(){
  b.disabled=true;m.textContent='';
  try{
    await (signedIn?logout():login());
  }catch(e){m.textContent=e.message||String(e);b.disabled=false}
}
b.addEventListener('click',go);
</script>
